plugins {
    id 'com.android.application'
}

android {
    namespace 'it.radio.tv'
    compileSdk 34

    defaultConfig {
        applicationId "it.radio.tv"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug   { debuggable true }
        release { minifyEnabled false }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {}
